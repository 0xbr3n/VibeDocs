{% extends "base.html" %}
{% block title %}Forgot password - VibeDocs{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="card auth-card">
    <h1 style="margin:0 0 6px;font-size:18px">Forgot your password?</h1>
    <p class="muted small" style="margin:0 0 14px">
      Enter the email associated with your account. If we have one on file,
      we'll send a single-use reset link (valid for 30 minutes).
    </p>
    <form id="forgot-form">
      <label>
        Email
        <input type="email" name="email" id="email-input" required autofocus
               autocomplete="email" placeholder="you@example.com">
      </label>
      <button class="btn-primary lg" type="submit" id="submit-btn">Send reset link</button>
    </form>
    <p id="forgot-msg" class="small" style="margin:14px 0 0;min-height:1.4em"></p>
    <div class="divider"></div>
    <p class="muted small" style="margin:0;text-align:center">
      <a href="/login" style="color:var(--accent)">← Back to sign in</a>
    </p>
  </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email-input').value.trim();
  const msg = document.getElementById('forgot-msg');
  const btn = document.getElementById('submit-btn');
  if (!email) return;
  btn.disabled = true;
  msg.textContent = 'Submitting…';
  msg.style.color = 'var(--text-2)';
  try {
    const r = await fetch('/api/auth/forgot', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    const data = await r.json().catch(() => ({}));
    if (r.status === 429){
      msg.textContent = data.detail || 'Too many requests. Try again later.';
      msg.style.color = 'var(--err-fg)';
    } else {
      // Always show the generic success message — we never confirm whether
      // the email exists, to avoid account enumeration.
      msg.textContent = data.message || 'If an account exists for that email, a reset link is on the way.';
      msg.style.color = 'var(--ok-fg)';
    }
  } catch (err) {
    msg.textContent = 'Network error: ' + err.message;
    msg.style.color = 'var(--err-fg)';
  } finally {
    btn.disabled = false;
  }
});
</script>
{% endblock %}
