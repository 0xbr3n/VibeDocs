{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Change Password</h1>
</div>

<div class="card" style="max-width:500px;margin:24px 0">
  <div class="card-h"><h2>Update Your Password</h2></div>
  <div style="padding:20px">
    <form id="password-form">
      <label>
        Current Password
        <input type="password" name="current_password" required>
      </label>
      <label>
        New Password
        <input type="password" name="new_password" required minlength="8">
      </label>
      <label>
        Confirm New Password
        <input type="password" name="confirm_password" required minlength="8">
      </label>
      <div class="actions" style="margin-top:16px">
        <button type="submit" class="btn-primary">Update Password</button>
        <a href="/profile" class="btn-secondary">Cancel</a>
      </div>
      <p id="message" class="small" style="margin-top:12px"></p>
    </form>
  </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
document.getElementById('password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('message');
  const fd = new FormData(e.target);
  
  if (fd.get('new_password') !== fd.get('confirm_password')) {
    msg.textContent = 'Passwords do not match';
    msg.style.color = 'red';
    return;
  }
  
  msg.textContent = 'Updating...';
  msg.style.color = '#999';
  
  try {
    const resp = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        current_password: fd.get('current_password'),
        new_password: fd.get('new_password')
      }),
      credentials: 'include'
    });
    
    if (resp.ok) {
      msg.textContent = 'Password updated successfully!';
      msg.style.color = 'green';
      e.target.reset();
    } else {
      const err = await resp.json();
      msg.textContent = 'Error: ' + (err.detail || resp.status);
      msg.style.color = 'red';
    }
  } catch (err) {
    msg.textContent = 'Error: ' + err.message;
    msg.style.color = 'red';
  }
});
</script>
{% endblock %}
